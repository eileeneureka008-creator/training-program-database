<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}培养方案数据库系统{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(90deg, rgba(26,82,118,0.12) 0%, rgba(26,82,118,0.05) 30%, transparent 45%, transparent 55%, rgba(139,37,0,0.05) 70%, rgba(139,37,0,0.12) 100%);
            color: #2c3e50; min-height: 100vh; position: relative; overflow-x: hidden;
        }

        /* ===== 背景圆形：左蓝右红，淡色半透明 ===== */
        .bg-logo {
            position: fixed; pointer-events: none; z-index: 0;
            width: 300px; height: 300px;
            border-radius: 50%; overflow: hidden;
        }
        .bg-logo.left  {
            top: 50%; left: 2%; transform: translateY(-50%);
            background: rgba(26,82,118,0.08);
            box-shadow: 0 0 120px rgba(26,82,118,0.06);
        }
        .bg-logo.right {
            top: 50%; right: 2%; transform: translateY(-50%);
            background: rgba(139,37,0,0.08);
            box-shadow: 0 0 120px rgba(139,37,0,0.06);
        }
        .bg-logo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }

        /* ===== 背景城市剪影 ===== */
        .bg-city {
            position: fixed; bottom: 0; left: 0; right: 0; height: 32%;
            pointer-events: none; z-index: 0; opacity: 0.045;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            background: linear-gradient(135deg, #0b1a2e 0%, #122a44 40%, #1a3d5c 100%);
            color: #fff; padding: 10px 20px;
            display: flex; align-items: center; gap: 16px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
        }
        .navbar a { color: #ccc; text-decoration: none; font-size: 13px; transition: all 0.3s; padding: 5px 10px; border-radius: 5px; }
        .navbar a:hover { color: #fff; background: rgba(255,255,255,0.1); text-decoration: none; transform: translateY(-1px); }
        .navbar .brand { font-size: 17px; font-weight: bold; letter-spacing: 1.5px; color: #fff; }

        /* ===== 校徽区（官方PNG）===== */
        .emblem-group { display: flex; align-items: center; gap: 14px; margin-left: auto; }
        .emblem-item {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 14px; border-radius: 22px;
            transition: all 0.35s ease; cursor: pointer;
        }
        .emblem-item:hover { transform: scale(1.08); }
        .emblem-item.swufe { background: rgba(26,82,118,0.15); }
        .emblem-item.swufe:hover { background: rgba(26,82,118,0.35); box-shadow: 0 0 24px rgba(26,82,118,0.5); }
        .emblem-item.sufe { background: rgba(139,37,0,0.15); }
        .emblem-item.sufe:hover { background: rgba(139,37,0,0.35); box-shadow: 0 0 24px rgba(139,37,0,0.5); }
        .emblem-item .logo-img { width: 42px; height: 42px; object-fit: contain; border-radius: 50%; filter: brightness(1.1) contrast(1.1); }
        .emblem-item .info { font-size: 11px; line-height: 1.4; color: #ddd; }
        .emblem-item .info .zh { font-weight: 600; font-size: 13px; color: #fff; }
        .emblem-item .info .en { font-size: 10px; opacity: 0.6; }

        /* ===== 容器 ===== */
        .container { max-width: 1000px; margin: 28px auto; padding: 0 16px; position: relative; z-index: 1; }

        /* ===== 卡片 ===== */
        .card {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 24px; margin-bottom: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
        th { background: #f0f4f8; font-weight: 600; color: #1a5276; font-size: 14px; }
        tr { transition: background 0.2s; }
        tr:hover { background: #f5f9fd; }
        .btn {
            display: inline-block; padding: 10px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; text-decoration: none;
            transition: all 0.3s ease; font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            color: #fff; box-shadow: 0 3px 10px rgba(26,82,118,0.3);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(26,82,118,0.45); transform: translateY(-2px); }
        .btn-primary:active { transform: scale(0.96); transition: transform 0.1s; }
        input, select {
            padding: 10px 14px; border: 2px solid #dde; border-radius: 8px;
            font-size: 14px; width: 100%; transition: all 0.3s;
        }
        input:focus, select:focus { border-color: #1a5276; box-shadow: 0 0 0 3px rgba(26,82,118,0.08); outline: none; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; color: #555; }
        .tag { display: inline-block; padding: 3px 10px; background: #e8f4fd; color: #1a5276; border-radius: 12px; font-size: 12px; margin: 2px; }
        .tag.green { background: #e8fde8; color: #1a6e1a; }
        .error { color: #c0392b; background: #ffeaea; padding: 14px; border-radius: 8px; }
        .result-count { color: #777; font-size: 13px; margin-bottom: 12px; }
        .flex-row { display: flex; gap: 12px; align-items: flex-end; }
        .flex-row .form-group { flex: 1; }
        h2 { margin-bottom: 16px; color: #1a3a4a; font-weight: 700; }
        h3 { margin-bottom: 12px; color: #1a5276; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.5s ease forwards; }

        #nlResult { display: none; margin-top: 16px; }
        #nlResult .intent-badge {
            display: inline-block; padding: 5px 14px; background: #1a5276; color: #fff;
            border-radius: 14px; font-size: 12px; margin-bottom: 14px;
        }
    </style>
</head>
